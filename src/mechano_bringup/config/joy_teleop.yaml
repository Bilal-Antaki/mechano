# Joystick teleop configuration

teleop_twist_joy_node:
  ros__parameters:
    # Axis mappings (adjust for your controller)
    axis_linear:
      x: 1  # Left stick vertical
    axis_angular:
      yaw: 0  # Left stick horizontal

    # Scale factors
    scale_linear:
      x: 0.5  # m/s
    scale_angular:
      yaw: 1.0  # rad/s

    # Turbo mode (when holding turbo button)
    scale_linear_turbo:
      x: 1.0  # m/s
    scale_angular_turbo:
      yaw: 2.0  # rad/s

    # Enable button (must be held to drive)
    enable_button: 4  # L1/LB

    # Turbo button (hold for faster speeds)
    enable_turbo_button: 5  # R1/RB

    # Require enable button to be held
    require_enable_button: true

    # Publish cmd_vel to teleop topic (goes through twist_mux)
    publish_stamped_twist: false
