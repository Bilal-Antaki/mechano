# Twist multiplexer configuration
# Allows multiple velocity sources with priority levels

twist_mux:
  ros__parameters:
    topics:
      navigation:
        topic: cmd_vel_nav
        timeout: 0.5
        priority: 10
      teleop:
        topic: cmd_vel_teleop
        timeout: 0.5
        priority: 100
      recovery:
        topic: cmd_vel_recovery
        timeout: 0.5
        priority: 50

    locks:
      e_stop:
        topic: e_stop
        timeout: 0.0
        priority: 255
