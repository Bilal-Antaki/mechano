version: '3.8'

services:
  # Real robot bringup
  robot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: robot
    image: mechano:robot
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - ../src:/ros2_ws/src:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
    command: ros2 launch mechano_bringup bringup.launch.py

  # Gazebo simulation
  sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: sim
    image: mechano:sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USE_SIM_TIME=true
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../src:/ros2_ws/src:ro
    command: ros2 launch mechano_gazebo gazebo.launch.py

  # Navigation stack
  nav:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: robot
    image: mechano:robot
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USE_SIM_TIME=${USE_SIM_TIME:-false}
    volumes:
      - ../src:/ros2_ws/src:ro
      - ./maps:/ros2_ws/maps
    command: ros2 launch mechano_navigation navigation.launch.py

  # SLAM mapping
  slam:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: robot
    image: mechano:robot
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USE_SIM_TIME=${USE_SIM_TIME:-false}
    volumes:
      - ../src:/ros2_ws/src:ro
      - ./maps:/ros2_ws/maps
    command: ros2 launch mechano_navigation slam.launch.py

  # RViz visualization
  rviz:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: sim
    image: mechano:sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USE_SIM_TIME=${USE_SIM_TIME:-false}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../src:/ros2_ws/src:ro
    command: ros2 launch mechano_viz view_robot.launch.py

  # Development container
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: mechano:dev
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - ..:/ros2_ws:rw
    working_dir: /ros2_ws
    command: bash
